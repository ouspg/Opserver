name: opserver

services:
  mysql:
    image: mysql:8.4
    # skip-name-resolve: älä tee käänteistä DNS-hakua joka yhteydelle.
    # Ilman tätä jokainen tuore yhteys (isännältä porttiin 21212) jumittaa
    # sekunnin+ macOS/Docker-gatewayn IP:n reverse-DNS:ssä — hidastaa jokaista näkymän avausta.
    command: ["--skip-name-resolve"]
    ports:
      - "21212:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./tietokanta/alustus.sql:/docker-entrypoint-initdb.d/alustus.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  webui:
    build:
      context: .
      dockerfile: webui/Dockerfile
    ports:
      - "12121:12121"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      WEBUI_AUTH_KAYTTAJA: ${WEBUI_AUTH_KAYTTAJA:-}
      WEBUI_AUTH_SALASANA: ${WEBUI_AUTH_SALASANA:-}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
